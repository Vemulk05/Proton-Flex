[env:proton]
platform = https://github.com/norandomtechie/platform-raspberrypi#feature/proton-picosdk-support
board = proton
framework = picosdk
debug_tool = picoprobe
upload_protocol = picoprobe
monitor_speed = 115200
monitor_port = COM4
monitor_dtr = 0
monitor_rts = 0

build_flags =
    -O0
    -Wl,"$PROJECT_SRC_DIR/autotest.o"
    -Ilib/FatFs_SPI/include
    -Ilib/FatFs_SPI/ff15/source
    -Ilib/FatFs_SPI/sd_driver

lib_compat_mode = off